<!DOCTYPE html>
<html>

<head>
    <title>Login - The Grand Archive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="landing">



    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">The Grand Archive</a>
            <div class="ms-auto">
                <a href="index.html" class="nav-btn">Return</a>
            </div>
        </div>
    </nav>

    <section class="hero login-section">
        <div class="container">
            <div class="hero-content mx-auto text-center login-box">
                <h2>Identify Yourself</h2>
                <p class="login-subtitle">"Present your credentials to access the forbidden knowledge."</p>

                <form action="index.html" class="login-form">
                    <div class="mb-4 text-start">
                        <label for="username" class="form-label">Scholar Name / Email</label>
                        <input type="text" class="form-control vintage-input" id="username"
                            placeholder="Enter your designation" required>
                    </div>
                    <div class="mb-4 text-start">
                        <label for="password" class="form-label">Secret Passphrase</label>
                        <input type="password" class="form-control vintage-input" id="password"
                            placeholder="Enter your passphrase" required>
                    </div>
                    <button type="submit" class="cta-btn w-100 mt-2 border-0">Enter the Archive</button>

                    <div class="mt-4">
                        <a href="#" class="forgot-link">Forgot your passphrase?</a>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <p>©The Archival Society</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
