<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Grand Archive</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;600&family=Metamorphous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --primary-gold: #c5a059;
            --dark-bg: #12100e;
            --accent-gold: #e2c08d;
            --card-bg: rgba(18, 16, 14, 0.9);
        }

        body {
            background-color: var(--dark-bg);
            color: #d4c2a8;
            font-family: 'Cormorant Garamond', serif;
            min-height: 100vh;
        }

        h1, h2, h3, h4, .cinzel {
            font-family: 'Cinzel', serif;
            color: var(--primary-gold);
        }

        .admin-navbar {
            background: #1a1714;
            border-bottom: 1px solid var(--primary-gold);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }

        .nav-brand-text {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: var(--primary-gold);
            text-decoration: none;
            letter-spacing: 2px;
        }

        .dashboard-card {
            background: var(--card-bg);
            border: 1px solid var(--primary-gold);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.1);
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .card-header-premium {
            background: rgba(197, 160, 89, 0.1);
            border-bottom: 1px solid var(--primary-gold);
            padding: 1.25rem;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 0.5rem 1.5rem;
            font-family: 'Cinzel', serif;
            transition: all 0.3s ease;
            margin-right: 0.5rem;
        }

        .tab-btn:hover, .tab-btn.active {
            background: var(--primary-gold);
            color: var(--dark-bg);
        }

        .table-premium {
            color: #d4c2a8 !important;
            border-color: #444;
            background-color: transparent !important;
        }

        .table-premium th {
            color: var(--primary-gold) !important;
            font-family: 'Cinzel', serif;
            border-color: #444;
            background-color: #1a1714 !important;
        }

        .table-premium td {
            border-color: #444;
            color: #d4c2a8 !important;
            background-color: transparent !important;
        }

        .table-premium tbody tr {
            background-color: transparent !important;
        }

        .btn-premium-action {
            padding: 0.4rem 1rem;
            font-size: 0.9rem;
            font-family: 'Cinzel', serif;
            transition: all 0.2s;
        }

        .btn-delete {
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            background: transparent;
        }

        .btn-delete:hover {
            background: #ff4d4d;
            color: white;
        }

        .btn-gold {
            background: var(--primary-gold);
            color: var(--dark-bg);
            border: none;
        }

        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        .form-control-premium {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 0.75rem;
            border-radius: 0;
        }

        .form-control-premium:focus {
            background: #2a2a2a;
            border-color: var(--primary-gold);
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.2);
            color: #fff;
        }

        .add-book-form {
            background: rgba(0,0,0,0.2);
            padding: 2rem;
            border: 1px solid #444;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .tab-buttons { display: flex; flex-direction: column; gap: 10px; }
            .tab-btn { margin-right: 0; }
        }
    </style>
</head>
<body>
    <nav class="admin-navbar">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <a href="index.html" class="nav-brand-text">GRAND ARCHIVE</a>
                <div class="d-flex align-items-center">
                    <span class="me-3 cinzel">Admin: <span id="admin-name">Admin</span></span>
                    <button onclick="logout()" class="tab-btn btn-sm">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="row mb-4">
            <div class="col-12 text-center">
                <h2 class="mb-4">Admin Dashboard</h2>
                <div class="tab-buttons d-inline-flex flex-wrap justify-content-center">
                    <button class="tab-btn active" onclick="showTab('users-section')">Manage Users</button>
                    <button class="tab-btn" onclick="showTab('books-section')">Manage Books</button>
                    <button class="tab-btn" onclick="window.location.href='library.html'">View Site</button>
                </div>
            </div>
        </div>

        <!-- Users Section -->
        <section id="users-section" class="admin-section active">
            <div class="dashboard-card">
                <div class="card-header-premium">
                    <h3 class="h5 mb-0">Registered Users</h3>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table id="users-table" class="table table-premium mb-0">
                            <thead>
                                <tr>
                                    <th>ID-NO</th>
                                    <th>FULL NAME</th>
                                    <th>EMAIL</th>
                                    <th>ROLE</th>
                                    <th class="text-center">ACTIONS</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <!-- Books Section -->
        <section id="books-section" class="admin-section">
            <div class="dashboard-card">
                <div class="card-header-premium d-flex justify-content-between align-items-center">
                    <h3 class="h5 mb-0">Library Books</h3>
                    <button class="btn btn-gold btn-sm btn-premium-action" onclick="toggleBookForm()">+ Add New Book</button>
                </div>
                
                <!-- This is the part where you see all the books currently in the archive -->
                <div class="card-body">
                    <!-- ADD NEW BOOK FORM: This box appears when you click "+ Add New Book" -->
                    <div id="add-book-form" class="add-book-form" style="display: none;">
                        <h4 class="h6 mb-4 cinzel">Add New Book Record</h4>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small">Title (Book Name)</label>
                                <input type="text" id="book-title" class="form-control form-control-premium">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small">Author (Writer)</label>
                                <input type="text" id="book-author" class="form-control form-control-premium">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Genre (Type of Book)</label>
                                <input type="text" id="book-genre" class="form-control form-control-premium">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Stock (How many books?)</label>
                                <input type="number" id="book-stock" class="form-control form-control-premium" value="1">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Image Path (e.g. img/book.jpg)</label>
                                <input type="text" id="book-image" class="form-control form-control-premium" placeholder="img/cover.jpg">
                            </div>
                            <div class="col-12">
                                <label class="form-label small">Summary (Short story about the book)</label>
                                <textarea id="book-summary" class="form-control form-control-premium" rows="3"></textarea>
                            </div>
                            <div class="col-12 text-end">
                                <button class="btn btn-secondary btn-sm me-2 btn-premium-action cinzel" onclick="toggleBookForm()">Cancel</button>
                                <button class="btn btn-gold btn-sm btn-premium-action cinzel" onclick="addBook()">Save Book</button>
                            </div>
                        </div>
                    </div>

                    <!-- BOOK LIST TABLE: Displays all books from the database -->
                    <div class="table-responsive">
                        <table id="books-table" class="table table-premium mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>TITLE</th>
                                    <th>AUTHOR</th>
                                    <th>STOCK</th>
                                    <th class="text-center">ACTIONS</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
    <script>
        // Security check
        if (localStorage.getItem('userRole') !== 'admin') {
            window.location.href = 'login.html';
        }
        document.getElementById('admin-name').textContent = localStorage.getItem('userName') || 'Admin';

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
