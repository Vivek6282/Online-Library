<!DOCTYPE html>
<html>

<head>
    <!-- The title shown at the top of the browser tab -->
    <title>Amal Jyothi College Archive</title>
    <!-- Makes the page look good on phones and computers -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Loads Bootstrap for basic layout building blocks -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Our custom design choices -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="landing">

    <!-- Animated Statues -->
    <div class="landing-deco start-top">
        <img src="img/statue.png" alt="Statue">
    </div>
    <div class="landing-deco start-bottom">
        <img src="img/thinker.jpg" alt="Thinker">
    </div>

    <!-- Navigation bar at the top -->
    <nav class="navbar py-3" style="position: relative; z-index: 1000;">
            <a class="navbar-brand cinzel" href="index.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <img src="img/ajcelogo.png" alt="AJCE Logo" style="height: 60px; width: auto; filter: drop-shadow(0 0 5px rgba(197, 160, 89, 0.5));">
                <span style="color: #c5a059; font-weight: bold; letter-spacing: 2px; font-size: 1.5rem;">Amal Jyothi College Archive</span>
            </a>
            <div id="nav-actions" class="d-flex align-items-center gap-3">
                <a href="login.html" id="auth-link-landing" class="nav-btn"
                    style="display: none; border: 1px solid rgba(197, 160, 89, 0.5); color: #c5a059; font-family: 'Cinzel', serif; padding: 6px 18px; text-decoration: none; font-size: 0.9rem;">Scholar
                    Login</a>
                <button id="logout-btn-landing" class="nav-btn"
                    style="display: none; background: #8b0000; border: 1px solid #c5a059; color: #f5e6d3; font-family: 'Cinzel', serif; padding: 6px 18px; font-size: 0.9rem;">Logout</button>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <div class="hero-content mx-auto text-center">
                <h1>Welcome to the Amal Jyothi College Archive</h1>
                <p>"A sanctuary for the preservation of forbidden knowledge and classical arts."</p>
                <a href="library.html" id="begin-exploration" class="cta-btn">Begin Exploration</a>
            </div>
        </div>
    </section>

    <footer>
        <p>©Amal Jyothi College Management</p>
    </footer>

    <!-- Bootstrap logic for dropdowns and menus -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Our custom logic for the landing page entrance and exit motions -->
    <script src="js/landing.js"></script>
</body>

</html>
