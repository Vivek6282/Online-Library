<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta tags for proper rendering and mobile responsiveness -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title shown in browser tab -->
    <title>Library Pavilion Login</title>

    <!-- Main stylesheet (all visual design lives in css/style.css) -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Elegant Google Font pair chosen to match museum-style aesthetic -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Top-level container that holds the background slider and centered login card -->
    <div class="page">
      <!-- Background area with cycling book images -->
      <div
        class="background-slider"
        aria-hidden="true"
        data-slider-container
      >
        <!-- Dark overlay improves text readability over images -->
        <div class="background-overlay"></div>
        <!-- This inner element will have its background-image updated by slider.js -->
        <div class="background-frame" data-slider-frame></div>
      </div>

      <!-- Main content area for accessibility -->
      <main class="main" role="main">
        <!-- Decorative heading area inspired by museum-style layout -->
        <section class="intro" aria-label="Library philosophy">
          <h1 class="intro-title">A Place Where Stories Awaken</h1>
          <p class="intro-subtitle">
            Enter the library pavilion to unlock curated collections of
            knowledge, art, and imagination.
          </p>
        </section>

        <!-- Accessible login section -->
        <section
          class="login-section"
          aria-labelledby="login-heading"
          aria-describedby="login-description"
        >
          <!-- Login card with glassmorphism and golden frame styling -->
          <div class="login-card" role="form">
            <header class="login-header">
              <h2 id="login-heading" class="login-title">Curator Login</h2>
              <p id="login-description" class="login-description">
                Authenticate to continue your journey through the virtual
                stacks.
              </p>
            </header>

            <!-- Status message area for success and error feedback -->
            <div
              id="login-message"
              class="login-message"
              role="alert"
              aria-live="polite"
            ></div>

            <!-- Actual login form; JS will prevent default page reload -->
            <form id="login-form" novalidate>
              <!-- Username field group -->
              <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-input"
                    autocomplete="username"
                    required
                    aria-required="true"
                  />
                </div>
              </div>

              <!-- Password field group with show/hide toggle -->
              <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-wrapper input-wrapper--password">
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    autocomplete="current-password"
                    required
                    aria-required="true"
                  />
                  <!-- Button used to toggle visibility of password text -->
                  <button
                    type="button"
                    class="toggle-password"
                    aria-label="Show password"
                    aria-pressed="false"
                  >
                    👁
                  </button>
                </div>
              </div>

              <!-- Remember me / options row -->
              <div class="form-row">
                <label class="checkbox-label">
                  <input
                    type="checkbox"
                    id="remember-me"
                    name="remember-me"
                    class="checkbox-input"
                  />
                  <span class="checkbox-text">Remember me on this device</span>
                </label>

                <!-- Small helper text to suggest keyboard support -->
                <p class="helper-text">Press Enter to login</p>
              </div>

              <!-- Login button with spinner and subtle interaction effects -->
              <button
                type="submit"
                id="login-button"
                class="btn-login"
                aria-disabled="false"
              >
                <span class="btn-label">Enter Pavilion</span>
                <!-- Spinner shown while AJAX request is active -->
                <span
                  class="btn-spinner"
                  aria-hidden="true"
                  hidden
                ></span>
              </button>

              <!-- Hint text for lockout feedback -->
              <p id="lockout-info" class="lockout-info" aria-live="polite"></p>
            </form>
          </div>
        </section>
      </main>
    </div>

    <!-- JavaScript: background first, then login logic; both loaded with defer to avoid blocking HTML parsing -->
    <script src="js/slider.js" defer></script>
    <script src="js/login.js" defer></script>
  </body>
</html>
