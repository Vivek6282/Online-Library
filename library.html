<!DOCTYPE html>
<html>

<head>
    <title>Library System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background Collage Elements -->
    <div class="collage-bg">

        <img src="img/statue.png" class="collage-item collage-statue" alt="Vintage Statue">
        <img src="img/hands.png" class="collage-item collage-hands" alt="Creation of Adam Hands">
        <img src="img/butterfly.png" class="collage-item collage-butterfly" alt="Vintage Butterfly">


    </div>

    <header class="library-header">
        <!-- Top row: back button (left) and cart (right) -->
        <div class="container py-2">
            <div class="d-flex justify-content-between align-items-center">
                <a href="index.html" class="back-btn">&#x21A4; Return to The Menu</a>
                <button id="cartBtn" class="btn btn-outline-secondary position-relative" aria-label="View reservations">
                    <span class="cart-icon">🛒</span>
                    <span id="cartCount" class="badge bg-primary text-white position-absolute"
                        style="top:-8px;right:-10px;">0</span>
                </button>
            </div>
        </div>

        <!-- Title centered on its own row for better wrapping on narrow screens -->
        <div class="container text-center my-2">
            <h1 class="h3">The Book Catalog</h1>
        </div>

        <!-- Search row: responsive using Bootstrap grid (select small, input fluid) -->
        <div class="container header-search">
            <div class="row gx-2 align-items-center">
                <div class="col-auto">
                    <select id="genreSelect" class="form-select form-select-sm" aria-label="Select genre">
                        <option value="All">All Genres</option>
                    </select>
                </div>
                <div class="col">
                    <div class="position-relative">
                        <input type="text" id="searchInput" class="form-control form-control-sm"
                            placeholder="Search by Title">
                        <ul id="suggestions" class="suggestions" role="listbox" hidden aria-hidden="true"></ul>
                    </div>
                </div>
            </div>

            <!-- cart panel moved to Offcanvas (defined later) -->
        </div>
    </header>
    <main class="container my-4">
        <div id="stats" class="mb-3 d-flex gap-3">
            <span id="totalBooks" class="me-3"></span>
            <span id="reservedCount"></span>
        </div>



        <div id="bookContainer" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3"></div>
        <nav id="pagination" aria-label="Books pagination" class="mt-4"></nav>
    </main>

    <!-- Current reservations (UI only) -->
    <section id="reservationsPanel" class="reservations-panel">
        <h2>Current Reservations</h2>
        <div id="reservationsList">No reservations yet.</div>
    </section>
    <!-- Bootstrap Offcanvas for Cart -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartPanel" aria-labelledby="cartPanelLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="cartPanelLabel">Reservations</h5>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div class="cart-list mb-3" id="cartList"></div>
            <div class="cart-footer mt-auto text-end">
                <button id="closeCart" class="btn btn-secondary" data-bs-dismiss="offcanvas">Close</button>
            </div>
        </div>
    </div>

    <!-- Reservation modal (Bootstrap) -->
    <div class="modal fade" id="reserveModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="reserveTitle">Reserve Book</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="reserveBookName">Select how many days to reserve this book (max 15 days):</p>
                    <label class="form-label" for="reserveDays">Days</label>
                    <select id="reserveDays" class="form-select"></select>
                </div>
                <div class="modal-footer">
                    <button type="button" id="confirmReserve" class="btn btn-primary">Confirm</button>
                    <button type="button" id="cancelReserve" class="btn btn-secondary"
                        data-bs-dismiss="modal">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation modal (Bootstrap) -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmTitle">Please confirm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="confirmMessage">Are you sure?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" id="confirmYes" class="btn btn-primary">Yes</button>
                    <button type="button" id="confirmNo" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
</body>

</html>
